<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Registration</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="dark-toggle">🌙 Dark Mode</div>

    <h2>✨ Premium Registration</h2>

    <form>

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter valid email" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" minlength="6" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="Enter phone number" required>
        </div>

        <div class="buttons">
            <button type="submit" class="register">🚀 Register Now</button>
            <button type="reset" class="reset">🔄 Reset</button>
        </div>

    </form>

</div>

</body>
</html>
